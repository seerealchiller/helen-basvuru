<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ne Kadar Helen'sin Başvuru Formu</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fef3e7 0%, #fbe4d8 40%, #f7cfc4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    max-width: 520px;
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(180, 100, 60, 0.18);
    padding: 36px 32px;
  }
  h1 {
    font-size: 24px;
    color: #b5442a;
    margin: 0 0 4px 0;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: #a08b7d;
    font-size: 14px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-weight: 600;
    color: #4a3b32;
    margin-bottom: 8px;
    margin-top: 22px;
    font-size: 15px;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #f0ddd0;
    border-radius: 10px;
    font-size: 15px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #e08a5b;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fdf6f1;
    border: 2px solid #f0ddd0;
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .option:hover {
    border-color: #e08a5b;
    background: #fcefe6;
  }
  .option input {
    accent-color: #b5442a;
    width: 18px;
    height: 18px;
  }
  .option span {
    font-size: 15px;
    color: #4a3b32;
  }
  button {
    width: 100%;
    margin-top: 32px;
    padding: 14px;
    background: linear-gradient(135deg, #e08a5b, #b5442a);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(181, 68, 42, 0.3);
  }
  .result {
    display: none;
    margin-top: 24px;
    background: #fdf6f1;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .result.show { display: block; }
  .result h2 {
    color: #b5442a;
    margin: 0 0 10px 0;
    font-size: 18px;
  }
  .result p {
    color: #4a3b32;
    font-size: 14px;
    line-height: 1.6;
    margin: 0;
    white-space: pre-line;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🌅 Ne Kadar Helen'sin Başvuru Formu</h1>
    <p class="subtitle">Aşağıdaki soruları cevapla, seni ne kadar tanıdığımıza karar verelim.</p>

    <form id="helenForm">
      <label for="isim">1. Adınız</label>
      <input type="text" id="isim" name="isim" placeholder="Adınızı yazın..." required>

      <label>2. Birini seç</label>
      <div class="options">
        <label class="option"><input type="radio" name="icecek" value="kokteyl" required><span>🍹 Kokteyl</span></label>
        <label class="option"><input type="radio" name="icecek" value="bira"><span>🍺 Bira</span></label>
        <label class="option"><input type="radio" name="icecek" value="sarap"><span>🍷 Şarap</span></label>
      </div>

      <label>3. Barselona'da bir gün batımı mı, yoksa NYC'de rooftopta manzara mı?</label>
      <div class="options">
        <label class="option"><input type="radio" name="manzara" value="barselona" required><span>🌇 Barselona'da gün batımı</span></label>
        <label class="option"><input type="radio" name="manzara" value="nyc"><span>🏙️ NYC'de rooftop manzarası</span></label>
      </div>

      <label>4. Davut dendiğinde aklınıza kim geliyor?</label>
      <div class="options">
        <label class="option"><input type="radio" name="davut" value="michelangelo" required><span>🗿 Michelangelo'nun Davut heykeli</span></label>
        <label class="option"><input type="radio" name="davut" value="guloglu"><span>🎤 Davut Güloğlu</span></label>
      </div>

      <button type="submit">Başvuruyu Gönder</button>
    </form>

    <div class="result" id="result">
      <h2 id="resultTitle"></h2>
      <p id="resultText"></p>
    </div>
  </div>

<script>
  document.getElementById('helenForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const isim = document.getElementById('isim').value;
    const icecek = document.querySelector('input[name="icecek"]:checked')?.value;
    const manzara = document.querySelector('input[name="manzara"]:checked')?.value;
    const davut = document.querySelector('input[name="davut"]:checked')?.value;

    const icecekMap = { kokteyl: 'Kokteyl', bira: 'Bira', sarap: 'Şarap' };
    const manzaraMap = { barselona: 'Barselona gün batımı', nyc: 'NYC rooftop manzarası' };
    const davutMap = { michelangelo: 'Michelangelo\'nun Davut heykeli', guloglu: 'Davut Güloğlu' };

    document.getElementById('resultTitle').textContent = `Teşekkürler, ${isim}! 🎉`;
    document.getElementById('resultText').textContent =
      `Tercihin: ${icecekMap[icecek]}\n${manzaraMap[manzara]}\nDavut deyince aklına gelen: ${davutMap[davut]}\n\nBaşvurun kaydedildi!`;

    document.getElementById('result').classList.add('show');
  });
</script>
</body>
</html>
